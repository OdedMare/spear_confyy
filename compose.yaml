services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: spear
      POSTGRES_USER: spear
      POSTGRES_PASSWORD: spear
    volumes:
      - spear-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spear -d spear"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    environment:
      SPEAR_DATABASE_URL: postgresql://spear:spear@database:5432/spear
      SPEAR_LLM_BASE_URL: ${SPEAR_LLM_BASE_URL:-http://host.docker.internal:8001/v1}
      SPEAR_LLM_API_KEY: ${SPEAR_LLM_API_KEY:-null}
      SPEAR_LLM_MODEL: ${SPEAR_LLM_MODEL:-gemma4-31b}
      SPEAR_GITLAB_URL: ${SPEAR_GITLAB_URL:-}
      SPEAR_GITLAB_TOKEN: ${SPEAR_GITLAB_TOKEN:-}
      SPEAR_TEAM_USERNAME: ${SPEAR_TEAM_USERNAME:-team}
      SPEAR_TEAM_PASSWORD: ${SPEAR_TEAM_PASSWORD:-spear-local}
      SPEAR_TEAM_DISPLAY_NAME: ${SPEAR_TEAM_DISPLAY_NAME:-צוות Spear}
      SPEAR_SESSION_SECRET: ${SPEAR_SESSION_SECRET:-local-development-secret-change-me}
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 20

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  spear-postgres:

